{% extends "base.html" %}

{% block content %}
    <a href="javascript:history.back()">back</a>
    <h1>Profile</h1>

    <div class="user_info">
        <p>{{ user.name }}</p>
        <p>{{ user.email }}</p>
        <p>{{ user.bio }}</p>
        <div class="artwork_thumbnail" style="background-image: url('{{user.profile_image.url}}')"></div>
    </div>

    <a href="{% url 'edit_profile' %}">
        <button>Edit Profile</button>
    </a>

{% endblock %}
