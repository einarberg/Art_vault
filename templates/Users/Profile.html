{% extends "base.html" %}

{% block content %}
    <a href="javascript:history.back()">back</a>
    <h1>Profile</h1>

    <div class="user_info">
        <a>{{ user.name }}</a>
        <a>{{ user.email }}</a>
        <a>{{ user.bio }}</a>
        <div class="artwork_thumbnail" style="background-image: url({{user.profile_image}})"></div>
    </div>

    <a href="{% url 'edit_profile' %}">
        <button>Edit Profile</button>
    </a>

{% endblock %}
