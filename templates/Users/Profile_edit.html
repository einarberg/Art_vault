{% extends "base.html" %}

{% block content %}

<div style="
max-width:900px;
margin:40px auto;
color:white;
">

    <a href="javascript:history.back()"
    style="
    color:#A2C2D4;
    text-decoration:none;
    ">
        ← Back
    </a>

    <div style="
    margin-top:20px;
    background:#003B5C;
    padding:35px;
    border-radius:10px;
    border:1px solid #005B5C;
    ">

        <h1>Edit Profile</h1>

        <hr style="margin-bottom:30px;">

        <form
        method="post"
        action="{% url 'edit_profile' %}"
        enctype="multipart/form-data">

            {% csrf_token %}

            <div style="margin-bottom:20px;">
                <label>Name</label><br>
                {{ form.name }}
            </div>

            <div style="margin-bottom:20px;">
                <label>Email</label><br>
                {{ form.email }}
            </div>

            <div style="margin-bottom:20px;">
                <label>Bio</label><br>
                {{ form.bio }}
            </div>

            <div style="margin-bottom:30px;">
                <label>Profile image</label><br>
                {{ form.profile_image }}
            </div>

            <button
            type="submit"
            style="
            background:#008080;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            ">
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
