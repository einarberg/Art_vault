{% extends "base.html" %}

{% block content %}

<div style="
background:#001F45;
width:100%;
min-height:100vh;
padding:40px 0;
">

    <h1 style="
    color:white;
    text-align:center;
    margin-bottom:40px;
    ">
        All Artists
    </h1>

    <div style="
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:30px;
    max-width:1600px;
    margin:auto;
    padding:0 40px;
    ">

        {% for artist in artists %}

        <div style="
        background:#003B5C;
        border-radius:12px;
        overflow:hidden;
        border:1px solid #005B5C;
        min-height:450px;
        ">

            <a href="{% url 'seller_profile' id=artist.id %}"
            style="
            color:white;
            text-decoration:none;
            ">

                <div style="
                height:260px;
                background-image:url('{{ artist.profile_image }}');
                background-size:cover;
                background-position:center;
                background-repeat:no-repeat;
                margin:20px;
                border-radius:10px;
                ">
                </div>

                <div style="
                padding:20px;
                ">

                    <h2 style="
                    margin-bottom:10px;
                    ">
                        {{ artist.name }}
                    </h2>

                    <p style="
                    color:#A2C2D4;
                    margin-bottom:15px;
                    ">
                        {{ artist.email }}
                    </p>

                    <p style="
                    color:#ddd;
                    line-height:1.5;
                    ">
                        {{ artist.bio|truncatechars:120 }}
                    </p>

                </div>

            </a>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
