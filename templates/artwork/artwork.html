<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>artwork</title>
    <style>
        body{
            background-color: #F0E5D8;
        }

        .artwork-container{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            background-color: #001F3F;
        }

        .artwork-images{
            background-color: #003B5C;
            width: 496px;
            height: 677px;
        }

        .artwork-info{
            color: #A2C2D4;
        }

        .artwork-thumbnail{
            height: 576px;
            width: 458px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

    </style>
</head>
<body>
    <a href="javascript:history.back()">back</a>
    <div class="artwork-container">
        <div class="artwork-images">
            <div class="artwork-thumbnail" style="background-image: url({{artwork.thumbnail}})"></div>
        </div>
        <div class="artwork-info">
            <h1>{{ artwork.title }}</h1>
            <p>By: {{ artwork.artist }}</p>
            <p>Medium: {{ artwork.medium }}</p>
            <p>Style: {{ artwork.style }}</p>
            <p>Starting bid:</p>
            <p>Dimensions: {{ artwork.dimensions }}</p>
            <p>Year of creation: {{ artwork.year_of_creation }}</p>
            <p>Edition: {{ artwork.edition }}</p>
            <p>Provenance: {{ artwork.provenance }}</p>
        </div>
        <div></div>
    </div>
</body>
</html>
